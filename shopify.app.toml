# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "eb828cb1c4957cf1b511a5005f48f205"
application_url = "https://delivery-pulse-production.up.railway.app"
embedded = true
name = "delivery-pulse"

[access_scopes]
scopes = "write_products,write_metaobjects,write_metaobject_definitions"

[webhooks]
api_version = "2026-07"

  [[webhooks.subscriptions]]
  uri = "/webhooks/app/uninstalled"
  topics = ["app/uninstalled"]

  [[webhooks.subscriptions]]
  uri = "/webhooks/app/scopes_update"
  topics = ["app/scopes_update"]

  [[webhooks.subscriptions]]
  uri = "/webhooks/customers/data_request"
  topics = ["customers/data_request"]

  [[webhooks.subscriptions]]
  uri = "/webhooks/customers/redact"
  topics = ["customers/redact"]

  [[webhooks.subscriptions]]
  uri = "/webhooks/shop/redact"
  topics = ["shop/redact"]

[auth]
redirect_urls = [
  "https://delivery-pulse-production.up.railway.app/auth/callback",
  "https://delivery-pulse-production.up.railway.app/auth/shopify/callback",
  "https://delivery-pulse-production.up.railway.app/api/auth/callback"
]

[build]
automatically_update_urls_on_dev = false